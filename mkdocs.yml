site_name: UniSessions
site_description: Convert AI coding CLI sessions between Codex, Claude Code, Pi, OpenCode, Devin, and Factory. SDK, CLI, MCP chat recall, and trace export.
site_url: https://vibheksoni.github.io/session-export/
repo_url: https://github.com/vibheksoni/session-export
repo_name: vibheksoni/session-export
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.png

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Guides:
    - CLI Reference: cli.md
    - Trace Export: traces.md
    - MCP Server: mcp-server.md
    - Search: search.md
  - Architecture:
    - Overview: architecture.md
    - Stores: stores.md
    - Converters: converters.md
    - Models: models.md
    - Paths: paths.md
    - Data Fidelity: data-fidelity.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vibheksoni/session-export
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/unisessions/
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/ImVibhek
    - icon: material/web
      link: https://vibheksoni.com
  generator: false

plugins:
  - search
  - tags

copyright: Copyright &copy; 2026 Vibhek Soni — MIT License
